<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>BoxSys PDV — Sem Conexão</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }
    body {
      height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #e2e8f0;
    }
    .card { text-align: center; max-width: 380px; padding: 40px; }
    .icon {
      width: 72px; height: 72px; border-radius: 20px; margin: 0 auto 24px;
      background: rgba(244,63,94,0.12); border: 1px solid rgba(244,63,94,0.25);
      display: flex; align-items: center; justify-content: center; font-size: 32px;
    }
    h1 { font-size: 16px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.12em; }
    p { font-size: 12px; color: #94a3b8; margin: 12px 0 28px; line-height: 1.6; }
    button {
      height: 46px; padding: 0 32px; border: none; border-radius: 14px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: #fff;
      font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.15em;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⚠️</div>
    <h1>Sem Conexão</h1>
    <p>Não foi possível conectar ao servidor da loja.<br/>Verifique sua internet e tente novamente.</p>
    <button onclick="window.boxsysDesktop.retry()">Tentar Novamente</button>
  </div>
</body>
</html>
