name: Build Desktop App

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            args: --win
          - os: macos-latest
            args: --mac
          - os: ubuntu-latest
            args: --linux
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build and publish installers
        # --publish always: publica direto no GitHub Release da tag (cria se não existir),
        # incluindo latest.yml/latest-mac.yml/latest-linux.yml que o electron-updater
        # (autoUpdater) consulta para saber se há versão nova.
        run: npx electron-builder ${{ matrix.args }} --publish always
        if: startsWith(github.ref, 'refs/tags/desktop-v')

      - name: Build only (no publish)
        run: npx electron-builder ${{ matrix.args }} --publish never
        if: ${{ !startsWith(github.ref, 'refs/tags/desktop-v') }}

      - name: Upload artifacts (manual runs / PRs)
        if: ${{ !startsWith(github.ref, 'refs/tags/desktop-v') }}
        uses: actions/upload-artifact@v4
        with:
          name: boxsys-pdv-${{ matrix.os }}
          path: |
            desktop/release/*.exe
            desktop/release/*.dmg
            desktop/release/*.AppImage
          if-no-files-found: error
